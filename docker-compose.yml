services:
  mongo-order:
    image: mongo:7
    container_name: mongo-order
    ports:
      - "27017:27017"
    volumes:
      - mongo-order-data:/data/db

  redis-cart:
    image: redis:7
    container_name: redis-cart
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-order-data:
  postgres-data: