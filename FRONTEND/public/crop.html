<!DOCTYPE html>
<html>
<head>
  <title>Crop Image to Circle</title>
</head>
<body>
  <canvas id="canvas" style="display:none;"></canvas>
  <textarea id="base64" style="width:100%; height:400px;"></textarea>
  <script>
    const img = new Image();
    img.src = 'input.png';
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      const size = Math.min(img.width, img.height);
      canvas.width = size;
      canvas.height = size;
      
      // Draw circular mask
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      
      // Draw image cropped to the center
      const offsetX = (img.width - size) / 2;
      const offsetY = (img.height - size) / 2;
      ctx.drawImage(img, offsetX, offsetY, size, size, 0, 0, size, size);
      
      // Export as PNG base64
      const dataUrl = canvas.toDataURL('image/png');
      document.getElementById('base64').value = dataUrl.split(',')[1];
      document.body.appendChild(document.createElement('div')).id = 'done';
    };
  </script>
</body>
</html>
